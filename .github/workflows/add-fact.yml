name: Add Approved Fact

on:
  issues:
    types: [labeled]

jobs:
  add-fact:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract fact and update facts.json
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            // Parse the fact from the issue form (### Le Fact section)
            const match = body.match(/### Le Fact\s*\n+([^\n#][^\n]*(?:\n(?![#\-\[])[^\n]*)*)/);
            if (!match) {
              core.setFailed(`Could not parse the fact from issue #${issue.number}. Body was:\n${body}`);
              return;
            }

            const factText = match[1].trim();
            if (!factText || factText === '_No response_') {
              core.setFailed('Fact text is empty.');
              return;
            }

            // Reject facts containing JavaScript code patterns
            const jsPatterns = [
              /<script/i,
              /javascript\s*:/i,
              /on\w+\s*=/i,          // HTML event handlers (onerror=, onload=, onclick=…)
              /eval\s*\(/i,
              /document\s*\./i,
              /window\s*\./i,
              /\bimport\s*\(/i,
              /\brequire\s*\(/i,
              /fetch\s*\(/i,
              /XMLHttpRequest/i,
            ];
            const matchedPattern = jsPatterns.find(p => p.test(factText));
            if (matchedPattern) {
              core.setFailed(`Fact #${issue.number} rejected: contains JavaScript code (matched: ${matchedPattern}).`);
              return;
            }

            const fs = require('fs');
            const factsPath = 'facts.json';
            const facts = JSON.parse(fs.readFileSync(factsPath, 'utf8'));

            // Avoid duplicates
            if (facts.some(f => f.id === issue.number)) {
              console.log(`Fact #${issue.number} already exists, skipping.`);
              return;
            }

            facts.push({
              id: issue.number,
              text: factText,
              approved_at: new Date().toISOString().split('T')[0]
            });

            fs.writeFileSync(factsPath, JSON.stringify(facts, null, 2) + '\n');
            console.log(`Added fact #${issue.number}: ${factText}`);

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add facts.json
          git diff --cached --quiet || git commit -m "fact: add #${{ github.event.issue.number }} from @${{ github.event.issue.user.login }}"
          git push

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `✅ **Fact validé et ajouté au site !**\n\nMerci @${context.payload.issue.user.login} pour cette contribution au savoir universel sur Claude. 🎉\n\n→ [Voir le site](https://${context.repo.owner}.github.io/${context.repo.repo}/)`
            });

      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed',
              state_reason: 'completed'
            });
