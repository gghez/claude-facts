name: 💡 Submit a Claude Fact
description: Submit your Claude Fact to join the pantheon.
title: "[FACT] "
labels: ["proposed"]
body:
  - type: markdown
    attributes:
      value: |
        ## Submit a Claude Fact

        A good Claude Fact is: **absurd**, **funny**, and **believable** (for at least 0.1 second).
        Think [Chuck Norris facts](https://www.chucknorrisfacts.fr) but for AI.

  - type: textarea
    id: fact
    attributes:
      label: The Fact
      description: One sentence only. No trailing punctuation required. Be creative.
      placeholder: "Claude can..."
    validations:
      required: true

  - type: checkboxes
    id: rules
    attributes:
      label: Checklist
      options:
        - label: My fact is original (not a copy of a Chuck Norris fact with "Claude" swapped in)
          required: true
        - label: My fact does not contain offensive, discriminatory or hateful content
          required: true
        - label: I agree to have my fact published on the site if approved
          required: true
